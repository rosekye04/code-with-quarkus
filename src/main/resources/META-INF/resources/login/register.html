<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends - 회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/toggle.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <img src="/images/LOL.webp" alt="" width="30" height="24">
            <button class="btn border-0" id="themeToggleBtn">DARK🌙</button>
        </div>
    </nav>

    <section class="hero d-flex align-items-center justify-content-center text-center py-5">
        <div class="container" style="max-width: 480px;">
            <h2 class="fw-bold mb-4">회원가입</h2>
            
            <form id="registerForm" action="/register_check" method="post">
                <div class="mb-3 text-start">
                    <label class="form-label">아이디 *</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="4~20자 영문/숫자" required>
                    <div class="invalid-feedback" id="usernameMsg"></div>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">패스워드 *</label>
                    <input type="password" class="form-control" id="password" placeholder="8자 이상, 영문+숫자+특수문자" required>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">패스워드 확인 *</label>
                    <input type="password" class="form-control" id="passwordConfirm" placeholder="패스워드 재입력" required>
                    <div class="invalid-feedback" id="passwordMsg"></div>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">이메일 *</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com" required>
                    <div class="invalid-feedback" id="emailMsg"></div>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">연락처 *</label>
                    <input type="text" class="form-control" id="phone" name="phone" placeholder="010-0000-0000" required>
                    <div class="invalid-feedback" id="phoneMsg"></div>
                </div>

                <input type="hidden" id="hashedPassword" name="password">

                <button type="button" class="btn btn-primary w-100" onclick="validateAndShowModal()">회원가입</button>
            </form>
        </div>
    </section>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">🎮 가입 확인</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>아래 정보로 가입하시겠습니까?</p>
                    <table class="table table-dark table-bordered">
                        <tr><th>아이디</th><td id="confirmUsername"></td></tr>
                        <tr><th>이메일</th><td id="confirmEmail"></td></tr>
                        <tr><th>연락처</th><td id="confirmPhone"></td></tr>
                        <tr><th>패스워드</th><td>******** (암호화 전송)</td></tr>
                    </table>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" onclick="submitRegister()">가입하기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function validateAndShowModal() {
            // 정보 모달에 입력
            document.getElementById('confirmUsername').innerText = document.getElementById('username').value;
            document.getElementById('confirmEmail').innerText = document.getElementById('email').value;
            document.getElementById('confirmPhone').innerText = document.getElementById('phone').value;

            // 모달 띄우기
            var myModal = new bootstrap.Modal(document.getElementById('confirmModal'));
            myModal.show();
        }

        function submitRegister() {
            // 비밀번호를 hidden 필드에 복사
            document.getElementById('hashedPassword').value = document.getElementById('password').value;
            // 폼 전송
            document.getElementById('registerForm').submit();
        }
    </script>
</body>
</html>
