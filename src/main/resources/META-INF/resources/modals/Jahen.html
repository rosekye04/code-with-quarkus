<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0a0e17; color: white; padding: 1.5rem; font-family: 'Segoe UI', sans-serif; }
    h3, h4 { color: #c8aa6e; }
    .text-muted { color: #a0a0a0 !important; }
    .list-group-item { background: transparent; border-color: #444; color: white; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row g-4">
      <div class="col-lg-5 text-center">
        <img src="../image/Jahen.jpg" class="img-fluid rounded shadow-lg" alt="자헨" style="max-height: 480px; object-fit: contain;">
        <div class="mt-3">
          <h3 class="mb-1">자헨 (Jahen)</h3>
          <p class="text-muted fs-5">전사 / 난이도: 하</p>
        </div>
      </div>
      <div class="col-lg-7">
        <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
        <ul class="list-group list-group-flush mb-4">
          <li class="list-group-item">패시브: 강철의 의지</li>
          <li class="list-group-item">Q: 대지 분쇄</li>
          <li class="list-group-item">W: 방패 돌격</li>
          <li class="list-group-item">E: 정의의 외침</li>
          <li class="list-group-item">R: 불굴의 수호자</li>
        </ul>
        <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리</h4>
        <p class="text-secondary lh-lg">데마시아 최전방을 지키는 용맹한 기사입니다. 거대한 방패와 창을 사용하여 아군을 보호하며, 전장에서 결코 물러서지 않는 불굴의 정신을 상징합니다.</p>
      </div>
    </div>
  </div>
</body>
</html>
