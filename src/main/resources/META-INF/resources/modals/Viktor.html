<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0a0e17; color: white; padding: 1.5rem; font-family: 'Segoe UI', sans-serif; }
    h3, h4 { color: #c8aa6e; }
    .text-muted { color: #a0a0a0 !important; }
    .list-group-item { background: transparent; border-color: #444; color: white; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row g-4">
      <div class="col-lg-5 text-center">
        <img src="../image/Viktor.jpg" class="img-fluid rounded shadow-lg" alt="빅터" style="max-height: 480px; object-fit: contain;">
        <div class="mt-3">
          <h3 class="mb-1">빅터 (Viktor)</h3>
          <p class="text-muted fs-5">마법사 / 난이도: 중</p>
        </div>
      </div>
      <div class="col-lg-7">
        <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
        <ul class="list-group list-group-flush mb-4">
          <li class="list-group-item">패시브: 영광스러운 진화</li>
          <li class="list-group-item">Q: 힘의 전이</li>
          <li class="list-group-item">W: 중력장</li>
          <li class="list-group-item">E: 죽음의 광선</li>
          <li class="list-group-item">R: 혼돈의 폭풍</li>
        </ul>
        <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리</h4>
        <p class="text-secondary lh-lg">인류의 발전을 위해 기계화를 주장하는 자운의 과학자입니다. 아케인 시즌 2에서 새로운 모습으로 진화하며 더 강력하고 근원적인 힘을 다루게 되었습니다.</p>
      </div>
    </div>
  </div>
</body>
</html>
