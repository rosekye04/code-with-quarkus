<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0a0e17; color: white; padding: 1.5rem; font-family: 'Segoe UI', sans-serif; }
    h3, h4 { color: #c8aa6e; }
    .text-muted { color: #a0a0a0 !important; }
    .list-group-item { background: transparent; border-color: #444; color: white; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row g-4">
      <div class="col-lg-5 text-center">
        <img src="../image/Ambessa.jpg" class="img-fluid rounded shadow-lg" alt="암베사" style="max-height: 480px; object-fit: contain;">
        <div class="mt-3">
          <h3 class="mb-1">암베사 (Ambessa)</h3>
          <p class="text-muted fs-5">전사 / 난이도: 상</p>
        </div>
      </div>
      <div class="col-lg-7">
        <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
        <ul class="list-group list-group-flush mb-4">
          <li class="list-group-item">패시브: 정복자의 발걸음</li>
          <li class="list-group-item">Q: 교활한 휩쓸기</li>
          <li class="list-group-item">W: 가차없는 배격</li>
          <li class="list-group-item">E: 파열의 일격</li>
          <li class="list-group-item">R: 메다르다의 집행</li>
        </ul>
        <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리</h4>
        <p class="text-secondary lh-lg">녹서스의 군벌이자 멜 메다르다의 어머니입니다. 전장의 규율과 힘을 중시하며, 쌍검을 휘둘러 적을 무자비하게 섬멸하는 강력한 전사입니다.</p>
      </div>
    </div>
  </div>
</body>
</html>
