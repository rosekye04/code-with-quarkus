<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0a0e17; color: white; padding: 1.5rem; font-family: 'Segoe UI', sans-serif; }
    h3, h4 { color: #c8aa6e; }
    .text-muted { color: #a0a0a0 !important; }
    .list-group-item { background: transparent; border-color: #444; color: white; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row g-4">
      <div class="col-lg-5 text-center">
        <img src="../image/Mel.jpg" class="img-fluid rounded shadow-lg" alt="멜" style="max-height: 480px; object-fit: contain;">
        <div class="mt-3">
          <h3 class="mb-1">멜 (Mel)</h3>
          <p class="text-muted fs-5">마법사 / 난이도: 중</p>
        </div>
      </div>
      <div class="col-lg-7">
        <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
        <ul class="list-group list-group-flush mb-4">
          <li class="list-group-item">패시브: 의원의 권위</li>
          <li class="list-group-item">Q: 황금빛 파동</li>
          <li class="list-group-item">W: 메다르다의 가호</li>
          <li class="list-group-item">E: 빛의 결속</li>
          <li class="list-group-item">R: 아케인의 심판</li>
        </ul>
        <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리</h4>
        <p class="text-secondary lh-lg">필트오버의 유력한 의원이자 메다르다 가문의 일원입니다. 아케인 시즌 2에서 보여준 강력한 마법력을 바탕으로 전장에 합류하여 아군을 보호하고 적을 압도합니다.</p>
      </div>
    </div>
  </div>
</body>
</html>
